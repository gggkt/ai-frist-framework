name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  opencode:
    if: |
      github.event_name == 'pull_request' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check for merge command
        id: check_merge
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          if echo "$COMMENT_BODY" | grep -qE '/oc\s+merge'; then
            echo "should_merge=true" >> $GITHUB_OUTPUT
            echo "Merge command detected"
          else
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract user requirements
        id: user_requirements
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          # 提取 /oc review 后面的内容
          REQUIREMENTS=$(echo "$COMMENT_BODY" | sed -n 's/.*\/oc review\s*//p' | sed -n 's/.*\/opencode review\s*//p')
          if [ -n "$REQUIREMENTS" ]; then
            echo "USER_REQUIREMENTS<<EOF" >> $GITHUB_ENV
            echo "$REQUIREMENTS" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "User requirements extracted: $REQUIREMENTS"
          else
            echo "USER_REQUIREMENTS=" >> $GITHUB_ENV
            echo "No user requirements found"
          fi

      - name: Merge PR
        if: steps.check_merge.outputs.should_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            
            // 配置 git 身份
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            // 设置 git 用户信息（使用 PR 作者的信息）
            const prAuthor = pr.user.login;
            const prAuthorEmail = `${prAuthor}@users.noreply.github.com`;
            
            await exec.exec('git', ['config', 'user.email', prAuthorEmail]);
            await exec.exec('git', ['config', 'user.name', prAuthor]);
            
            if (pr.merged) {
              console.log('PR is already merged');
              return;
            }
            
            if (!pr.mergeable) {
              console.log('PR has conflicts and cannot be merged');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '❌ 无法合并：PR 存在冲突，请先解决冲突。'
              });
              return;
            }
            
            // 执行合并
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'  // 使用 squash 合并
              });
              
              console.log('PR merged successfully');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ PR 已通过 OpenCode 命令合并。'
              });
            } catch (error) {
              console.log('Merge failed:', error.message);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `❌ 合并失败：${error.message}`
              });
            }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        id: typecheck
        continue-on-error: true
        run: |
          echo "## TypeScript 类型检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm type-check 2>&1 | tee typecheck-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: |
          echo "## ESLint 代码检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm lint 2>&1 | tee lint-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          echo "## 单元测试" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm test 2>&1 | tee test-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Collect check results and rules
        id: results
        run: |
          # 收集所有检查结果
          {
            echo "TYPECHECK_RESULT<<EOF"
            cat typecheck-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "LINT_RESULT<<EOF"
            cat lint-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "TEST_RESULT<<EOF"
            cat test-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取通用审查规则
          {
            echo "COMMON_RULES<<EOF"
            cat .github/workflows/rules/pr-review-rules-common.md 2>/dev/null || echo "Common rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取服务端核心审查规则
          {
            echo "SERVER_CORE_RULES<<EOF"
            cat .github/workflows/rules/pr-review-rules-server.md 2>/dev/null || echo "Server core rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取服务端 Starter 审查规则
          {
            echo "SERVER_STARTER_RULES<<EOF"
            cat .github/workflows/rules/pr-review-rules-starter.md 2>/dev/null || echo "Server starter rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取管理后台审查规则
          {
            echo "ADMIN_RULES<<EOF"
            cat .github/workflows/rules/pr-review-rules-admin.md 2>/dev/null || echo "Admin rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取移动端审查规则
          {
            echo "MOBILE_RULES<<EOF"
            cat .github/workflows/rules/pr-review-rules-mobile.md 2>/dev/null || echo "Mobile rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run OpenCode
        uses: anomalyco/opencode/github-action@v1
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TYPECHECK_RESULT: ${{ env.TYPECHECK_RESULT }}
          LINT_RESULT: ${{ env.LINT_RESULT }}
          TEST_RESULT: ${{ env.TEST_RESULT }}
          COMMON_RULES: ${{ env.COMMON_RULES }}
          SERVER_CORE_RULES: ${{ env.SERVER_CORE_RULES }}
          SERVER_STARTER_RULES: ${{ env.SERVER_STARTER_RULES }}
          ADMIN_RULES: ${{ env.ADMIN_RULES }}
          MOBILE_RULES: ${{ env.MOBILE_RULES }}
          USER_REQUIREMENTS: ${{ env.USER_REQUIREMENTS }}
        with:
          model: bailian/qwen3.5-plus
          use_github_token: true
          prompt: |
            请审查这个 Pull Request：
            
            ## 用户的个性化审查要求
            
            ${{ env.USER_REQUIREMENTS }}
            
            ---
            
            ## 自动检查结果
            
            ### TypeScript 类型检查
            ```
            ${{ env.TYPECHECK_RESULT }}
            ```
            
            ### ESLint 代码检查
            ```
            ${{ env.LINT_RESULT }}
            ```
            
            ### 单元测试
            ```
            ${{ env.TEST_RESULT }}
            ```
            
            ---
            
            ## 通用审查规则
            
            所有 PR 都需要遵循以下规则：
            
            ${{ env.COMMON_RULES }}
            
            ---
            
            ## 专项审查规则
            
            根据此 PR 修改的文件路径，选择适用的专项审查规则：
            
            ### 如果修改了服务端核心代码（packages/aiko-boot/ 或 packages/aiko-boot-codegen/）
            
            ${{ env.SERVER_CORE_RULES }}
            
            ### 如果修改了服务端 Starter 代码（packages/aiko-boot-starter-*/）
            
            ${{ env.SERVER_STARTER_RULES }}
            
            ### 如果修改了管理后台代码（app/examples/admin/）
            
            ${{ env.ADMIN_RULES }}
            
            ### 如果修改了移动端代码（app/examples/mobile/）
            
            ${{ env.MOBILE_RULES }}
            
            请只选择适用的规则进行审查，不要审查不相关的规则。
            
            请用中文回复。
