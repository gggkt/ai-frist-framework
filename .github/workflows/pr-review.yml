name: PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        id: typecheck
        continue-on-error: true
        run: |
          echo "## TypeScript 类型检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm type-check 2>&1 | tee typecheck-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: |
          echo "## ESLint 代码检查" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm lint 2>&1 | tee lint-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          echo "## 单元测试" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm test 2>&1 | tee test-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Collect check results
        id: results
        run: |
          # 收集所有检查结果
          {
            echo "TYPECHECK_RESULT<<EOF"
            cat typecheck-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "LINT_RESULT<<EOF"
            cat lint-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
            echo "TEST_RESULT<<EOF"
            cat test-output.txt 2>/dev/null || echo "No output"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取通用审查规则
          {
            echo "COMMON_RULES<<EOF"
            cat .github/workflows/pr-review-rules-common.md 2>/dev/null || echo "Common rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取服务端组件审查规则
          {
            echo "SERVER_RULES<<EOF"
            cat .github/workflows/pr-review-rules-server.md 2>/dev/null || echo "Server rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取管理后台审查规则
          {
            echo "ADMIN_RULES<<EOF"
            cat .github/workflows/pr-review-rules-admin.md 2>/dev/null || echo "Admin rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV
          
          # 读取移动端审查规则
          {
            echo "MOBILE_RULES<<EOF"
            cat .github/workflows/pr-review-rules-mobile.md 2>/dev/null || echo "Mobile rules file not found"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TYPECHECK_RESULT: ${{ env.TYPECHECK_RESULT }}
          LINT_RESULT: ${{ env.LINT_RESULT }}
          TEST_RESULT: ${{ env.TEST_RESULT }}
          COMMON_RULES: ${{ env.COMMON_RULES }}
          SERVER_RULES: ${{ env.SERVER_RULES }}
          ADMIN_RULES: ${{ env.ADMIN_RULES }}
          MOBILE_RULES: ${{ env.MOBILE_RULES }}
        with:
          model: bailian/qwen3.5-plus
          use_github_token: true
          prompt: |
            请审查这个 Pull Request：
            
            ## 自动检查结果
            
            ### TypeScript 类型检查
            ```
            ${{ env.TYPECHECK_RESULT }}
            ```
            
            ### ESLint 代码检查
            ```
            ${{ env.LINT_RESULT }}
            ```
            
            ### 单元测试
            ```
            ${{ env.TEST_RESULT }}
            ```
            
            ---
            
            ## 通用审查规则
            
            所有 PR 都需要遵循以下规则：
            
            ${{ env.COMMON_RULES }}
            
            ---
            
            ## 专项审查规则
            
            根据此 PR 修改的文件路径，选择适用的专项审查规则：
            
            ### 如果修改了服务端组件代码（packages/aiko-boot/ 或 packages/aiko-boot-starter-*/）
            
            ${{ env.SERVER_RULES }}
            
            ### 如果修改了管理后台代码（app/examples/admin/）
            
            ${{ env.ADMIN_RULES }}
            
            ### 如果修改了移动端代码（app/examples/mobile/）
            
            ${{ env.MOBILE_RULES }}
            
            请只选择适用的规则进行审查，不要审查不相关的规则。
            
            请用中文回复。
